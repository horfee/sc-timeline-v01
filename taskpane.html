<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Timeline Sync</title>
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <link rel="stylesheet" href="taskpane.css">
	
</head>
<body onload="Office.onReady()">
	<!-- App logic -->
	<script type="text/javascript" defer src="taskpane.js"></script>
    <div class="container">  
        <header>
            <h2>Timeline Sync v.01.1</h2>
        </header>
        
        <main>
            <div class="form-group">
                <label for="workspace">Workspace:</label>
                <select id="workspace" class="form-control" name="workspace"></select>
            </div>
            <div class="form-group">
                <label for="activityType">Activity Type:</label>
                <select id="activityType" name="activityType" class="form-control">

                </select>
            </div>

            <div class="form-group">
                <label for="engagementType">Engagement Type:</label>
                <select id="engagementType" name="engagementType" class="form-control">
                </select>
            </div>

            <div class="form-group">
                <label for="customerEvent">Customer/Event:</label>
                <input type="text" id="customerEvent" name="customerEvent" class="form-control" placeholder="Enter Customer/Event">
            </div>

            <div class="form-group checkbox-group">
                <label for="OnSite">
                </label>
                <input type="checkbox" id="OnSite" name="OnSite" title="Check if it is in presence">
            </div>

            <div class="form-group checkbox-group">
                <label for="CustInteraction">
                </label>
                <input type="checkbox" id="CustInteraction" name="CustInteraction" title="Check if you meet customer">
            </div>

            <div class="form-group checkbox-group">
                <label for="Clevel">Meet VP/C-Level: </label>
                <input type="checkbox" id="Clevel" name="Clevel" title="Check if you meet an executive"> 
            </div>
            <div class="form-group checkbox-group">
                <label for="FullDay">In Timeline as full day(s): </label>
                <input type="checkbox" id="FullDay" name="FullDay" title="Check if you want to report as full day(s) in Timeline"> 
            </div>

            <div class="button-group">
                <button id="btnSync" class="btn btn-primary">Sync to Timeline</button>
                <button id="btnCancel" class="btn btn-secondary">Cancel</button>
            </div>

            <div id="status" class="status-message"></div>
			
            <div class="tenant-link">
				Follow this link if you want to open EAM Timeline tenant 
                <a href="https://eu1.eam.hxgnsmartcloud.com/web/base/logindisp?tenant=HXGNDEMO0016_DEM" target="_blank">
                    Open Timeline Tenant
                </a>
            </div>
        </main>
    </div>
	<script type="text/javascript" defer src="taskpane.js"></script>
</body>
</html>
